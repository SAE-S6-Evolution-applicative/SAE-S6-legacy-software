services:
  mysql-test:
    image: mysql:8.0.42
    container_name: mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: hospital_test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    command:
      - --log_bin_trust_function_creators=1
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest"]
      interval: 5s
      timeout: 5s
      retries: 5 