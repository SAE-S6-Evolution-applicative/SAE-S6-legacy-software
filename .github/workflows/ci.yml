name: CI # Nom du workflow (Continious Integration)

on: # Déclencheurs du workflow
  workflow_dispatch: # Permet de déclencher manuellement le workflow depuis l'interface GitHub
  push: # Déclenche le workflow à chaque push sur le dépôt

jobs: # Définition des tâches du workflow
  build: # Nom du job
    runs-on: ubuntu-latest # Spécifie l’environnement d’exécution (un runner Ubuntu)

    steps: # Définition des étapes du job
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v3 # Action permettant de cloner le code source du dépôt GitHub

      - name: Installer le JDK 21
        uses: actions/setup-java@v3 # Utilisation de l’action pour configurer l’environnement Java
        with:
          distribution: 'temurin' # Spécifie la distribution du JDK
          java-version: '21' # Version de Java utilisée

      - name: Mettre en cache les dépendances Gradle
        uses: actions/cache@v3 # Utilisation d’un cache pour optimiser les temps de build
        with:
          path: |
            ~/.gradle/caches # Mise en cache des fichiers Gradle
            ~/.gradle/wrapper # Mise en cache du wrapper Gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }} # Génération d’une clé de cache basée sur les fichiers Gradle
          restore-keys: |
            ${{ runner.os }}-gradle- # Clé de secours pour restaurer un cache partiel

      - name: Donner les permissions d’exécution à Gradle Wrapper
        run: chmod +x ./gradlew # Autorise l'exécution du script gradlew (nécessaire sur Linux)

      - name: Compiler le projet avec Gradle
        run: ./gradlew build -x test --no-daemon # Compilation du projet sans exécuter les tests

      - name: Exécuter les tests unitaires
        run: ./gradlew test --no-daemon # Lancement des tests unitaires avec Gradle

      - name: Vérifier la qualité du code
        run: ./gradlew check --no-daemon # Exécution des vérifications de qualité du code (Linting, analyse statique...)
