name: CI # Name of the workflow (Continuous Integration)

on: # Workflow triggers
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub interface
  push: # Triggers the workflow on every push to the repository

jobs: # Definition of the workflow jobs
  build: # Name of the job
    runs-on: ubuntu-latest # Specifies the execution environment (an Ubuntu runner)

    steps: # Definition of the job steps
      - name: Retrieve the repository code
        uses: actions/checkout@v3 # Action to clone the source code from the GitHub repository

      - name: Install JDK 21
        uses: actions/setup-java@v3 # Use the action to configure the Java environment
        with:
          distribution: 'temurin' # Specifies the JDK distribution
          java-version: '21' # Java version to use

      - name: Cache Gradle dependencies
        uses: actions/cache@v3 # Use a cache to optimize build times
        with:
          path: |
            ~/.gradle/caches # Cache Gradle files
            ~/.gradle/wrapper # Cache the Gradle wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }} # Generate a cache key based on Gradle files
          restore-keys: |
            ${{ runner.os }}-gradle- # Fallback key to restore a partial cache

      - name: Start MySQL container
        run: docker compose -f docker/docker-compose.test.yml up -d

      - name: Wait for MySQL to be ready
        run: |
          timeout 60s bash -c 'until docker exec mysql-test mysqladmin ping -h localhost -u root -ptest --silent; do sleep 2; done'

      - name: Grant execution permissions to Gradle Wrapper
        run: chmod +x ./gradlew # Allow execution of the gradlew script (required on Linux)

      - name: Build and test the project
        run: ./gradlew build --no-daemon # Build and run all tests
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3307
          MYSQL_DATABASE: hospital_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test

      - name: Check code quality
        run: ./gradlew check --no-daemon # Run code quality checks (Linting, static analysis...)

      - name: Stop MySQL container
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down