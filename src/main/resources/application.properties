# Application name
spring.application.name=legacy-hospital-system

# Server Configuration
server.port=8045
server.context-path=/hospital

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.sae.semestre.six=DEBUG
spring.main.allow-bean-definition-overriding=true

# Datasource and dialect Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true 

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Log
# General config
logging.file.name=application.log
logging.level.root=INFO

logging.level.com.votrepackage.billing=DEBUG
logging.config=classpath:logback-spring.xml

# Mail
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# Bill Security
app.security.hash-folder-path=bill/bills_security/